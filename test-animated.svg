<svg xmlns="http://www.w3.org/2000/svg" width="240" height="140" viewBox="0 0 240 140">
  <rect width="240" height="140" rx="14" fill="#16181e"/>
  <circle cx="40" cy="70" r="22" fill="#3b6fe0">
    <animate attributeName="cx" values="40;200;40" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#3b6fe0;#8a4fe0;#3b6fe0" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="120" y="128" font-family="system-ui,sans-serif" font-size="14"
        fill="#9aa0aa" text-anchor="middle">animated SVG (DOM overlay)</text>
</svg>

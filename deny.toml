# cargo-deny 配置:供应链审查(plan1 可后置,先给最小可用配置)
[graph]
targets = [
    { triple = "wasm32-unknown-unknown" },
    { triple = "x86_64-apple-darwin" },
]

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# 本仓库与常见依赖许可证白名单
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
